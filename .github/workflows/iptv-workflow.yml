name: IPTV Workflow

on:
  schedule:
    - cron: '0 0/12 * * *'
  workflow_dispatch:

concurrency:
  group: iptv-workflow
  cancel-in-progress: false

jobs:
  iptv-process:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📚 Install dependencies
        run: |
          pip install -r requirements.txt || echo "No requirements.txt found"

      - name: 🧹 Run mergeclean.py
        run: |
          echo "Running mergeclean.py..."
          python mergeclean.py || { echo "❌ mergeclean.py failed"; exit 1; }
          echo "✅ mergeclean.py completed."

      - name: 💾 Commit & Push after mergeclean.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add out/MergedCleanPlaylist.m3u8
          if git diff --cached --quiet; then echo "✅ No changes to commit"; exit 0; fi
          git commit -m "🔄 Update merged playlist"
          git pull origin main --rebase || exit 1
          git push origin main || exit 1

      - name: 🧹 Run del_tvg_id.py
        run: |
          echo "Running del_tvg_id.py..."
          python del_tvg_id.py || { echo "❌ del_tvg_id.py failed"; exit 1; }
          echo "✅ del_tvg_id.py completed."

      - name: 💾 Commit & Push after del_tvg_id.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add out/MergedCleanPlaylist_no_tvg_id.m3u8
          if git diff --cached --quiet; then echo "✅ No changes to commit"; exit 0; fi
          git commit -m "🔄 Update MergedCleanPlaylist_no_tvg_id"
          git pull origin main --rebase || exit 1
          git push origin main || exit 1

      - name: 📅 Run epg_getcher.py
        working-directory: .
        run: |
          echo "Running scripts/epg_getcher.py..."
          python scripts/epg_getcher.py || { echo "❌ epg_getcher.py failed"; exit 1; }
          echo "✅ epg_getcher.py completed."

      - name: 💾 Commit updated EPG files only if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          # DrewLive3.xml 比较并提交
          if [ -f out/DrewLive3.xml ]; then
            git show origin/main:out/DrewLive3.xml > /tmp/old_drew.xml || touch /tmp/old_drew.xml
            if ! cmp -s out/DrewLive3.xml /tmp/old_drew.xml; then
              echo "🔄 DrewLive3.xml has changed, committing..."
              git add out/DrewLive3.xml
              git commit -m "🔄 Update DrewLive3.xml"
            else
              echo "✅ DrewLive3.xml is unchanged, skipping commit."
            fi
          else
            echo "🚫 DrewLive3.xml not found. Skipping."
          fi

          # 如果有提交则推送
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            git pull origin main --rebase
            git push
          else
            echo "🚫 No changes to push."
          fi
